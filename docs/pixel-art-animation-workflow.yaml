---
#
# AGENT-EXECUTABLE WORKFLOW
# Target: Cursor IDE agent with thread-needle skill
# Task: Replace video animation with pixel art sprites in stitchAgent macOS app
# Requirements: macOS 14+, Xcode 15+, repo cloned at ./stitchAgent
# Execution: Single-pass, no human intervention, self-contained
#
---

meta:
  format: agent_handoff_v1
  target_agent: cursor_ide
  execution_mode: thread_needle (single-pass, no temp files)
  human_intervention_required: false
  assumptions:
    - repo_location: ./stitchAgent (already cloned from https://github.com/freyzo/stitchAgent)
    - platform: macOS_14+
    - xcode: 15+ (installed and working)
    - shell: zsh or bash

objective:
  primary: Replace AVFoundation video animation with CALayer-based pixel art sprite animation
  deliverable: Modified WalkerCharacter.swift + pixel art PNGs + updated Xcode project
  outcome: Character animates with 2-frame walk cycle instead of 10s video file

execution_sequence:
  # Thread-needle constraint: execute these as single command chains where possible
  
  step_1_generate_pixel_art:
    description: Create 64x64 pixel art sprite PNGs (idle + 2 walk frames)
    approach: SVG_to_PNG_pipeline
    command: |
      # Generate idle frame (base pose - symmetrical creature)
      cat > /tmp/idle.svg << 'IDLE_SVG'
      <svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
        <rect fill="#3a3a3a" width="64" height="64"/>
        <!-- Body (salmon/coral) -->
        <rect fill="#ff8866" x="16" y="24" width="32" height="24"/>
        <!-- Arms -->
        <rect fill="#ff8866" x="8" y="28" width="8" height="8"/>
        <rect fill="#ff8866" x="48" y="28" width="8" height="8"/>
        <!-- Legs (idle - both down) -->
        <rect fill="#ff8866" x="20" y="48" width="6" height="8"/>
        <rect fill="#ff8866" x="38" y="48" width="6" height="8"/>
        <!-- Eyes (black squares) -->
        <rect fill="#000000" x="24" y="30" width="4" height="4"/>
        <rect fill="#000000" x="36" y="30" width="4" height="4"/>
      </svg>
      IDLE_SVG
      
      # Generate walk frame 1 (left leg up, right leg down)
      cat > /tmp/walk1.svg << 'WALK1_SVG'
      <svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
        <rect fill="#3a3a3a" width="64" height="64"/>
        <rect fill="#ff8866" x="16" y="26" width="32" height="24"/>
        <rect fill="#ff8866" x="8" y="30" width="8" height="8"/>
        <rect fill="#ff8866" x="48" y="30" width="8" height="8"/>
        <!-- Left leg raised -->
        <rect fill="#ff8866" x="20" y="46" width="6" height="6"/>
        <!-- Right leg extended -->
        <rect fill="#ff8866" x="38" y="50" width="6" height="8"/>
        <rect fill="#000000" x="24" y="32" width="4" height="4"/>
        <rect fill="#000000" x="36" y="32" width="4" height="4"/>
      </svg>
      WALK1_SVG
      
      # Generate walk frame 2 (right leg up, left leg down)
      cat > /tmp/walk2.svg << 'WALK2_SVG'
      <svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
        <rect fill="#3a3a3a" width="64" height="64"/>
        <rect fill="#ff8866" x="16" y="26" width="32" height="24"/>
        <rect fill="#ff8866" x="8" y="30" width="8" height="8"/>
        <rect fill="#ff8866" x="48" y="30" width="8" height="8"/>
        <!-- Right leg raised -->
        <rect fill="#ff8866" x="38" y="46" width="6" height="6"/>
        <!-- Left leg extended -->
        <rect fill="#ff8866" x="20" y="50" width="6" height="8"/>
        <rect fill="#000000" x="24" y="32" width="4" height="4"/>
        <rect fill="#000000" x="36" y="32" width="4" height="4"/>
      </svg>
      WALK2_SVG
      
      # Convert to PNG and move to Assets.xcassets (create imageset structure)
      mkdir -p ./stitchAgent/StitchAgent/Assets.xcassets/character_idle.imageset
      mkdir -p ./stitchAgent/StitchAgent/Assets.xcassets/character_walk1.imageset
      mkdir -p ./stitchAgent/StitchAgent/Assets.xcassets/character_walk2.imageset
      
      # Use qlmanage (macOS built-in) to convert SVG to PNG at 2x scale (128x128)
      qlmanage -t -s 128 -o ./stitchAgent/StitchAgent/Assets.xcassets/character_idle.imageset/ /tmp/idle.svg && \
        mv ./stitchAgent/StitchAgent/Assets.xcassets/character_idle.imageset/idle.svg.png \
           ./stitchAgent/StitchAgent/Assets.xcassets/character_idle.imageset/character_idle@2x.png
      
      qlmanage -t -s 128 -o ./stitchAgent/StitchAgent/Assets.xcassets/character_walk1.imageset/ /tmp/walk1.svg && \
        mv ./stitchAgent/StitchAgent/Assets.xcassets/character_walk1.imageset/walk1.svg.png \
           ./stitchAgent/StitchAgent/Assets.xcassets/character_walk1.imageset/character_walk1@2x.png
      
      qlmanage -t -s 128 -o ./stitchAgent/StitchAgent/Assets.xcassets/character_walk2.imageset/ /tmp/walk2.svg && \
        mv ./stitchAgent/StitchAgent/Assets.xcassets/character_walk2.imageset/walk2.svg.png \
           ./stitchAgent/StitchAgent/Assets.xcassets/character_walk2.imageset/character_walk2@2x.png
      
      # Generate Contents.json for each imageset
      echo '{"images":[{"filename":"character_idle@2x.png","idiom":"universal","scale":"2x"}],"info":{"author":"xcode","version":1}}' > \
        ./stitchAgent/StitchAgent/Assets.xcassets/character_idle.imageset/Contents.json
      
      echo '{"images":[{"filename":"character_walk1@2x.png","idiom":"universal","scale":"2x"}],"info":{"author":"xcode","version":1}}' > \
        ./stitchAgent/StitchAgent/Assets.xcassets/character_walk1.imageset/Contents.json
      
      echo '{"images":[{"filename":"character_walk2@2x.png","idiom":"universal","scale":"2x"}],"info":{"author":"xcode","version":1}}' > \
        ./stitchAgent/StitchAgent/Assets.xcassets/character_walk2.imageset/Contents.json
      
      # Cleanup temp SVGs
      rm /tmp/{idle,walk1,walk2}.svg
    
    verification: ls -la ./stitchAgent/StitchAgent/Assets.xcassets/character_{idle,walk1,walk2}.imageset/

  step_2_replace_WalkerCharacter_swift:
    description: Replace video animation with sprite-based CALayer animation
    file: ./stitchAgent/StitchAgent/WalkerCharacter.swift
    strategy: complete_file_replacement (safer than line-by-line edits)
    
    new_file_content: |
      import AppKit
      
      class PopoverDragTitleBarView: NSView {
          var onDragChanged: ((NSPoint) -> Void)?
          private var dragStartScreenPoint: NSPoint = .zero
          private var dragStartWindowOrigin: NSPoint = .zero
      
          override func mouseDown(with event: NSEvent) {
              guard let win = window else { return }
              dragStartScreenPoint = NSEvent.mouseLocation
              dragStartWindowOrigin = win.frame.origin
          }
      
          override func mouseDragged(with event: NSEvent) {
              let current = NSEvent.mouseLocation
              let dx = current.x - dragStartScreenPoint.x
              let dy = current.y - dragStartScreenPoint.y
              let newOrigin = NSPoint(x: dragStartWindowOrigin.x + dx, y: dragStartWindowOrigin.y + dy)
              onDragChanged?(newOrigin)
          }
      }
      
      class WalkerCharacter {
          let videoName: String  // Keep for backward compat, but unused
          var window: NSWindow!
          
          // SPRITE ANIMATION - replaces AVFoundation
          var spriteLayer: CALayer!
          var spriteImages: [CGImage] = []
          var currentFrame = 0
          var frameTimer: Timer?
          let frameInterval: TimeInterval = 0.3  // 300ms per frame
          
          var videoWidth: CGFloat = 64  // Sprite size
          var videoHeight: CGFloat = 64
          var displayHeight: CGFloat = 300
          var displayWidth: CGFloat { displayHeight * (videoWidth / videoHeight) }
      
          // Walk timing (frame-based now, not video-time-based)
          var videoDuration: CFTimeInterval = 10.0  // Unused but kept for physics calc
          var accelStart: CFTimeInterval = 3.0
          var fullSpeedStart: CFTimeInterval = 3.75
          var decelStart: CFTimeInterval = 7.5
          var walkStop: CFTimeInterval = 8.25
          var walkAmountRange: ClosedRange<CGFloat> = 0.25...0.5
          var yOffset: CGFloat = 0
          var flipXOffset: CGFloat = 0
          var characterColor: NSColor = .gray
      
          // Walk state
          var playCount = 0
          var walkStartTime: CFTimeInterval = 0
          var positionX: CGFloat = 0.5
          var positionY: CGFloat = 0.1
          var isWalking = false
          var isPaused = true
          var pauseEndTime: CFTimeInterval = 0
          var goingRight = true
          var walkStartX: CGFloat = 0.0
          var walkEndX: CGFloat = 0.0
          var walkStartY: CGFloat = 0.0
          var walkEndY: CGFloat = 0.0
          var currentTravelDistance: CGFloat = 500.0
          var walkStartPixel: CGFloat = 0.0
          var walkEndPixel: CGFloat = 0.0
          var freeRoamMode = true
          var isOnboarding = false
          var isPinnedByUser = false
          
          // Hover interaction
          var isHovered = false
          var lastHoverTime: CFTimeInterval = 0
          var lastHoverSoundTime: CFTimeInterval = 0
          var hoverReactionShown = false
          private static let hoverPhrases = [
              "hi!", "hey!", "aloha!", "oh hi!", "what's up?",
              "hehe", "boop!", "*waves*", "yo!", "heya!",
              "meega nala kweesta!", "ohana!", ":3"
          ]
      
          // Popover state
          var isIdleForPopover = false
          var popoverWindow: NSWindow?
          var terminalView: TerminalView?
          var claudeSession: ClaudeSession?
          var clickOutsideMonitor: Any?
          var escapeKeyMonitor: Any?
          var currentStreamingText = ""
          weak var controller: StitchAgentController?
          var themeOverride: PopoverTheme?
          var isClaudeBusy: Bool { claudeSession?.isBusy ?? false }
          var thinkingBubbleWindow: NSWindow?
          var popoverPinnedOrigin: NSPoint?
          
          // Sound
          static var soundsEnabled = true
          var currentPhrase: String?
          var showingCompletion = false
      
          init(videoName: String) {
              self.videoName = videoName
          }
      
          // MARK: - Setup
      
          func setup() {
              // Load sprite images
              guard let idleImg = NSImage(named: "character_idle")?.cgImage(forProposedRect: nil, context: nil, hints: nil),
                    let walk1Img = NSImage(named: "character_walk1")?.cgImage(forProposedRect: nil, context: nil, hints: nil),
                    let walk2Img = NSImage(named: "character_walk2")?.cgImage(forProposedRect: nil, context: nil, hints: nil) else {
                  print("Failed to load sprite images")
                  return
              }
              
              spriteImages = [idleImg, walk1Img, walk2Img]
              
              // Create sprite layer
              spriteLayer = CALayer()
              spriteLayer.frame = CGRect(x: 0, y: 0, width: displayWidth, height: displayHeight)
              spriteLayer.contents = spriteImages[0]  // Start with idle
              spriteLayer.contentsGravity = .resizeAspect
              spriteLayer.backgroundColor = NSColor.clear.cgColor
      
              let screen = NSScreen.main!
              let dockTopY = screen.visibleFrame.origin.y
              let bottomPadding = displayHeight * 0.15
              let y = dockTopY - bottomPadding + yOffset
      
              let contentRect = CGRect(x: 0, y: y, width: displayWidth, height: displayHeight)
              window = NSWindow(
                  contentRect: contentRect,
                  styleMask: .borderless,
                  backing: .buffered,
                  defer: false
              )
              window.isOpaque = false
              window.backgroundColor = .clear
              window.hasShadow = false
              window.level = .statusBar
              window.ignoresMouseEvents = false
              window.collectionBehavior = [.canJoinAllSpaces, .stationary]
      
              let hostView = CharacterContentView(frame: CGRect(x: 0, y: 0, width: displayWidth, height: displayHeight))
              hostView.character = self
              hostView.wantsLayer = true
              hostView.layer?.backgroundColor = NSColor.clear.cgColor
              hostView.layer?.addSublayer(spriteLayer)
      
              window.contentView = hostView
              window.orderFrontRegardless()
          }
      
          // MARK: - Animation Control
          
          func startWalk() {
              isPaused = false
              isWalking = true
              playCount = 0
              walkStartTime = CACurrentMediaTime()
              
              guard let screen = NSScreen.main else { return }
              let screenFrame = screen.frame
              
              if freeRoamMode {
                  if positionX > 0.85 {
                      goingRight = false
                  } else if positionX < 0.15 {
                      goingRight = true
                  } else {
                      goingRight = Bool.random()
                  }
                  
                  walkStartX = positionX
                  walkStartY = positionY
                  
                  let walkDistX = CGFloat.random(in: 0.1...0.4)
                  if goingRight {
                      walkEndX = min(walkStartX + walkDistX, 0.95)
                  } else {
                      walkEndX = max(walkStartX - walkDistX, 0.05)
                  }
                  
                  if Bool.random() {
                      let yChange = CGFloat.random(in: -0.15...0.15)
                      walkEndY = min(max(walkStartY + yChange, 0.05), 0.7)
                  } else {
                      walkEndY = walkStartY
                  }
              } else {
                  if positionX > 0.85 {
                      goingRight = false
                  } else if positionX < 0.15 {
                      goingRight = true
                  } else {
                      goingRight = Bool.random()
                  }
      
                  walkStartX = positionX
                  let referenceWidth: CGFloat = 500.0
                  let walkPixels = CGFloat.random(in: walkAmountRange) * referenceWidth
                  let walkAmount = currentTravelDistance > 0 ? walkPixels / currentTravelDistance : 0.3
                  if goingRight {
                      walkEndX = min(walkStartX + walkAmount, 1.0)
                  } else {
                      walkEndX = max(walkStartX - walkAmount, 0.0)
                  }
                  walkEndY = walkStartY
              }
              
              walkStartPixel = walkStartX * screenFrame.width
              walkEndPixel = walkEndX * screenFrame.width
      
              updateFlip()
              
              // Start sprite animation timer
              frameTimer = Timer.scheduledTimer(withTimeInterval: frameInterval, repeats: true) { [weak self] _ in
                  self?.advanceFrame()
              }
          }
          
          func advanceFrame() {
              guard isWalking else { return }
              // Cycle through walk frames (1 and 2, skip 0 which is idle)
              currentFrame = currentFrame == 1 ? 2 : 1
              spriteLayer.contents = spriteImages[currentFrame]
          }
          
          func enterPause() {
              isWalking = false
              isPaused = true
              
              // Stop animation timer
              frameTimer?.invalidate()
              frameTimer = nil
              
              // Show idle frame
              currentFrame = 0
              spriteLayer.contents = spriteImages[0]
              
              let delay = Double.random(in: 1.5...4.0)
              pauseEndTime = CACurrentMediaTime() + delay
          }
      
          var idleFrameTime: CFTimeInterval = 0.0
          var idleCMTime: CMTime { CMTime(seconds: idleFrameTime, preferredTimescale: 600) }
      
          func updateFlip() {
              CATransaction.begin()
              CATransaction.setDisableActions(true)
              if goingRight {
                  spriteLayer.transform = CATransform3DIdentity
              } else {
                  spriteLayer.transform = CATransform3DMakeScale(-1, 1, 1)
              }
              spriteLayer.frame = CGRect(x: 0, y: 0, width: displayWidth, height: displayHeight)
              CATransaction.commit()
          }
      
          var currentFlipCompensation: CGFloat {
              goingRight ? 0 : flipXOffset
          }
      
          func movementPosition(at videoTime: CFTimeInterval) -> CGFloat {
              let dIn = fullSpeedStart - accelStart
              let dLin = decelStart - fullSpeedStart
              let dOut = walkStop - decelStart
              let v = 1.0 / (dIn / 2.0 + dLin + dOut / 2.0)
      
              if videoTime <= accelStart {
                  return 0.0
              } else if videoTime <= fullSpeedStart {
                  let t = videoTime - accelStart
                  return CGFloat(v * t * t / (2.0 * dIn))
              } else if videoTime <= decelStart {
                  let easeInDist = v * dIn / 2.0
                  let t = videoTime - fullSpeedStart
                  return CGFloat(easeInDist + v * t)
              } else if videoTime <= walkStop {
                  let easeInDist = v * dIn / 2.0
                  let linearDist = v * dLin
                  let t = videoTime - decelStart
                  return CGFloat(easeInDist + linearDist + v * (t - t * t / (2.0 * dOut)))
              } else {
                  return 1.0
              }
          }
      
          // MARK: - Frame Update
      
          func update(dockX: CGFloat, dockWidth: CGFloat, dockTopY: CGFloat) {
              guard let screen = NSScreen.main else { return }
              let screenFrame = screen.frame
              
              currentTravelDistance = max(dockWidth - displayWidth, 0)
              
              if isPinnedByUser && !isIdleForPopover {
                  // Keep sprite animating at pinned position
                  updateThinkingBubble()
                  return
              }
              
              if isIdleForPopover {
                  let x: CGFloat
                  let y: CGFloat
                  if freeRoamMode {
                      x = screenFrame.minX + (screenFrame.width - displayWidth) * positionX
                      y = screenFrame.minY + screenFrame.height * positionY
                  } else {
                      x = dockX + currentTravelDistance * positionX + currentFlipCompensation
                      y = dockTopY - displayHeight * 0.15 + yOffset
                  }
                  window.setFrameOrigin(NSPoint(x: x, y: y))
                  updatePopoverPosition()
                  updateThinkingBubble()
                  return
              }
      
              let now = CACurrentMediaTime()
      
              if isPaused {
                  if now >= pauseEndTime {
                      startWalk()
                  } else {
                      let x: CGFloat
                      let y: CGFloat
                      if freeRoamMode {
                          x = screenFrame.minX + (screenFrame.width - displayWidth) * positionX
                          y = screenFrame.minY + screenFrame.height * positionY
                      } else {
                          x = dockX + currentTravelDistance * positionX + currentFlipCompensation
                          y = dockTopY - displayHeight * 0.15 + yOffset
                      }
                      window.setFrameOrigin(NSPoint(x: x, y: y))
                      return
                  }
              }
      
              if isWalking {
                  let elapsed = now - walkStartTime
                  let videoTime = min(elapsed, videoDuration)
      
                  let walkNorm = elapsed >= videoDuration ? 1.0 : movementPosition(at: videoTime)
                  
                  positionX = walkStartX + (walkEndX - walkStartX) * CGFloat(walkNorm)
                  
                  if freeRoamMode {
                      positionY = walkStartY + (walkEndY - walkStartY) * CGFloat(walkNorm)
                  }
      
                  if elapsed >= videoDuration {
                      enterPause()
                      return
                  }
      
                  let x: CGFloat
                  let y: CGFloat
                  if freeRoamMode {
                      x = screenFrame.minX + (screenFrame.width - displayWidth) * positionX
                      y = screenFrame.minY + screenFrame.height * positionY
                  } else {
                      x = dockX + currentTravelDistance * positionX + currentFlipCompensation
                      y = dockTopY - displayHeight * 0.15 + yOffset
                  }
                  window.setFrameOrigin(NSPoint(x: x, y: y))
              }
      
              updateThinkingBubble()
          }
          
          // MARK: - Popover & Bubble (stub implementations - keep existing from original file)
          
          func handleClick() {
              if isOnboarding {
                  openOnboardingPopover()
                  return
              }
              if isIdleForPopover {
                  closePopover()
              } else {
                  openPopover()
              }
          }
          
          func openOnboardingPopover() { /* Keep original implementation */ }
          func closeOnboarding() { /* Keep original implementation */ }
          func openPopover() { /* Keep original implementation */ }
          func closePopover() { /* Keep original implementation */ }
          func createPopoverWindow() { /* Keep original implementation */ }
          func updatePopoverPosition() { /* Keep original implementation */ }
          func showBubble(text: String, isCompletion: Bool) { /* Keep original implementation */ }
          func hideBubble() { /* Keep original implementation */ }
          func updateThinkingBubble() { /* Keep original implementation */ }
          func handleMouseEntered() { /* Keep original implementation */ }
          func handleMouseExited() { /* Keep original implementation */ }
      }
    
    command: |
      # CRITICAL: This is a simplified replacement. In production, copy ALL methods from original.
      # For agent execution: use sed/awk to surgically replace only the animation-related sections.
      # Thread-needle approach: backup original, replace class properties + setup() + animation methods
      
      cp ./stitchAgent/StitchAgent/WalkerCharacter.swift ./stitchAgent/StitchAgent/WalkerCharacter.swift.backup && \
      sed -i.bak '1s/^/import AppKit\n/' ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
      sed -i.bak '/import AVFoundation/d' ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
      sed -i.bak 's/var playerLayer: AVPlayerLayer!/var spriteLayer: CALayer!/g' ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
      sed -i.bak 's/var queuePlayer: AVQueuePlayer!/var spriteImages: [CGImage] = []\n    var currentFrame = 0\n    var frameTimer: Timer?\n    let frameInterval: TimeInterval = 0.3/g' ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
      sed -i.bak 's/var looper: AVPlayerLooper!//g' ./stitchAgent/StitchAgent/WalkerCharacter.swift
      
      # NOTE: Full method replacements require entire file write (sed has limits).
      # Agent should write complete file with all original methods preserved except animation logic.

  step_3_verify_build:
    description: Ensure Xcode project compiles after changes
    command: |
      cd ./stitchAgent && \
      xcodebuild -project stitch-agent.xcodeproj -scheme StitchAgent -configuration Debug clean build \
        ONLY_ACTIVE_ARCH=YES CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO | \
      grep -E "(BUILD SUCCEEDED|error:)" | tail -5

complete_file_replacements:
  # Agent: Use these complete file contents to overwrite existing files
  
  WalkerCharacter_swift_COMPLETE:
    path: ./stitchAgent/StitchAgent/WalkerCharacter.swift
    note: "This is a STUB - agent must merge sprite animation logic with ALL original methods"
    critical_sections_to_replace:
      imports:
        old: "import AVFoundation"
        new: "import AppKit  // AVFoundation removed"
      
      properties:
        old: |
          var playerLayer: AVPlayerLayer!
          var queuePlayer: AVQueuePlayer!
          var looper: AVPlayerLooper!
        new: |
          var spriteLayer: CALayer!
          var spriteImages: [CGImage] = []
          var currentFrame = 0
          var frameTimer: Timer?
          let frameInterval: TimeInterval = 0.3
      
      setup_method:
        old_starts_at: "func setup() {"
        old_contains: "queuePlayer = AVQueuePlayer()"
        new_logic: |
          func setup() {
              guard let idleImg = NSImage(named: "character_idle")?.cgImage(forProposedRect: nil, context: nil, hints: nil),
                    let walk1Img = NSImage(named: "character_walk1")?.cgImage(forProposedRect: nil, context: nil, hints: nil),
                    let walk2Img = NSImage(named: "character_walk2")?.cgImage(forProposedRect: nil, context: nil, hints: nil) else {
                  print("Failed to load sprite images")
                  return
              }
              spriteImages = [idleImg, walk1Img, walk2Img]
              spriteLayer = CALayer()
              spriteLayer.frame = CGRect(x: 0, y: 0, width: displayWidth, height: displayHeight)
              spriteLayer.contents = spriteImages[0]
              spriteLayer.contentsGravity = .resizeAspect
              spriteLayer.backgroundColor = NSColor.clear.cgColor
              
              // ... rest of original window setup unchanged ...
              hostView.layer?.addSublayer(spriteLayer)  // Replace playerLayer with spriteLayer
          }
      
      startWalk_method:
        old_contains: "queuePlayer.seek(to: .zero)\n        queuePlayer.play()"
        new_logic: |
          updateFlip()
          frameTimer = Timer.scheduledTimer(withTimeInterval: frameInterval, repeats: true) { [weak self] _ in
              self?.advanceFrame()
          }
      
      enterPause_method:
        old_contains: "queuePlayer.pause()\n        queuePlayer.seek(to: idleTime)"
        new_logic: |
          frameTimer?.invalidate()
          frameTimer = nil
          currentFrame = 0
          spriteLayer.contents = spriteImages[0]
      
      add_new_method:
        name: advanceFrame
        code: |
          func advanceFrame() {
              guard isWalking else { return }
              currentFrame = currentFrame == 1 ? 2 : 1
              spriteLayer.contents = spriteImages[currentFrame]
          }

verification_commands:
  check_assets_created:
    command: |
      test -f ./stitchAgent/StitchAgent/Assets.xcassets/character_idle.imageset/character_idle@2x.png && \
      test -f ./stitchAgent/StitchAgent/Assets.xcassets/character_walk1.imageset/character_walk1@2x.png && \
      test -f ./stitchAgent/StitchAgent/Assets.xcassets/character_walk2.imageset/character_walk2@2x.png && \
      echo "✓ Sprite assets created" || echo "✗ Sprite assets missing"
  
  check_code_modified:
    command: |
      grep -q "var spriteLayer: CALayer!" ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
      ! grep -q "import AVFoundation" ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
      echo "✓ WalkerCharacter.swift modified" || echo "✗ Code changes incomplete"
  
  check_build_success:
    command: |
      cd ./stitchAgent && \
      xcodebuild -project stitch-agent.xcodeproj -scheme StitchAgent -configuration Debug \
        -destination 'platform=macOS' clean build 2>&1 | grep -q "BUILD SUCCEEDED" && \
      echo "✓ Build succeeded" || echo "✗ Build failed"

execution_notes:
  agent_instructions: |
    1. Run step_1_generate_pixel_art command (creates PNG sprites in Assets.xcassets)
    2. For step_2: Use complete file replacement strategy, not sed/awk (too fragile)
       - Read original WalkerCharacter.swift into memory
       - Replace imports, properties, setup(), startWalk(), enterPause()
       - Add advanceFrame() method
       - Preserve ALL other methods (popover, bubble, hover, etc) unchanged
       - Write complete modified file
    3. Run step_3_verify_build to confirm compilation
    4. If build fails: check compiler errors, likely missing method implementations
  
  human_handoff_point: |
    After agent completes:
    - Open Xcode: xed ./stitchAgent/stitch-agent.xcodeproj
    - Run (Cmd+R) and verify sprite animation works
    - Check: walking, idle, flip, hover, click interactions
    - If broken: restore backup and debug manually
  
  rollback: |
    cp ./stitchAgent/StitchAgent/WalkerCharacter.swift.backup \
       ./stitchAgent/StitchAgent/WalkerCharacter.swift && \
    rm -rf ./stitchAgent/StitchAgent/Assets.xcassets/character_{idle,walk1,walk2}.imageset

context_for_agent:
  what_changed: |
    - Animation engine: AVFoundation video playback → CALayer sprite swapping
    - Input: walk-stitch-01.mov (10s, 960x960) → 3x PNG sprites (64x64, scaled to 300pt)
    - Timing: Video seek(to: CMTime) → Timer-based frame cycling (300ms interval)
    - Loop: AVPlayerLooper → Timer.scheduledTimer(repeats: true)
    - State: Video time (0-10s) → Frame index (0=idle, 1-2=walk)
  
  what_stayed_same: |
    - Movement physics: movementPosition(at:) still calculates 0-1 normalized position
    - Walk behavior: ease-in, linear, ease-out curves unchanged
    - Position updates: window.setFrameOrigin() logic identical
    - Flip: CATransform3DMakeScale(-1, 1, 1) works on spriteLayer same as playerLayer
    - All UI: popover, bubbles, hover, click handlers untouched
  
  why_this_approach: |
    - CALayer sprite swap: Simplest replacement, mirrors playerLayer architecture
    - Avoid NSImageView: Want CALayer control for transforms and compositing
    - Avoid SpriteKit: Overkill for 2-frame animation, adds framework dependency
    - Frame timer: Decoupled from movement physics (timer fires, position updates separately)
    - Keep physics: movementPosition() still governs walk speed, animation just tracks it

success_criteria:
  - Xcode builds without errors
  - App launches with menu bar icon
  - Character appears on screen as pixel art creature
  - Character walks with 2-frame leg animation
  - Character flips direction correctly
  - Idle state shows front-facing frame
  - Click opens Claude chat popover
  - Hover shows speech bubble

failure_modes:
  - "Sprite images not found": Check Assets.xcassets structure and Contents.json
  - "Unrecognized selector": Missing method in replacement, restore backup
  - "App crashes on launch": Nil unwrapping sprite images, add proper error handling
  - "Character doesn't move": Physics logic broken, verify movementPosition() preserved
  - "Animation frozen": Timer not starting, check startWalk() calls frameTimer

